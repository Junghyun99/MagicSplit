name: MagicSplit Trading Bot (Domestic)

on:
  # [임시 비활성화] 개발 중이므로 스케줄 실행을 중지합니다.
  # schedule:
  #   # 한국 장 운영시간: 09:00~15:30 KST = UTC 00:00~06:30
  #   - cron: '0 0-6 * * 1-5'  # UTC 00:00~06:00 = KST 09:00~15:00 (월~금)
  workflow_dispatch:  # 수동 실행 허용

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run MagicSplit Bot
      env:
        CONFIG_JSON_PATH: config_domestic.json
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
        KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        KIS_ACC_NO: ${{ secrets.KIS_ACC_NO }}
        IS_LIVE: ${{ secrets.IS_LIVE }}
      run: |
        python src/main.py

    - name: Commit updated data files
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/data/ || true
        git diff --staged --quiet || git commit -m "Auto-update domestic trading data [skip ci]"
        git push || true

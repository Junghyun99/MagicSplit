name: MagicSplit Trading Bot (Domestic)

on:
  #schedule:
   # - cron: '58 0 * * 1-5'
  workflow_dispatch:
    inputs:
      skip_holiday_check:
        description: '한국 공휴일 체크를 건너뛰고 강제 실행(수동 디버그용)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: trading-domestic
  cancel-in-progress: false

jobs:
  trade-domestic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: Asia/Seoul

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Show runner time (timezone debug)
      run: |
        echo "Runner UTC : $(date -u '+%Y-%m-%d %H:%M:%S %Z')"
        echo "KST equiv  : $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S %Z')"

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check Korean holiday
      id: holiday
      if: ${{ github.event_name == 'schedule' || inputs.skip_holiday_check != true }}
      run: |
        python - <<'PY'
        import os, datetime, zoneinfo, holidays
        kr = holidays.country_holidays('KR')
        kst_tz = zoneinfo.ZoneInfo('Asia/Seoul')
        today_kst = datetime.datetime.now(datetime.timezone.utc).astimezone(kst_tz).date()
        is_holiday = today_kst in kr
        name = kr.get(today_kst, "")
        print(f"KST today={today_kst}, holiday={is_holiday}, name={name}")
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"is_holiday={'true' if is_holiday else 'false'}\n")
            f.write(f"kst_date={today_kst.isoformat()}\n")
        PY

    - name: Skip if holiday
      if: ${{ steps.holiday.outputs.is_holiday == 'true' }}
      run: |
        echo "::notice title=Holiday Skip::${{ steps.holiday.outputs.kst_date }} 는 한국 공휴일입니다. 실행을 건너뜁니다."
        exit 0

    - name: Restore KIS token cache
      if: ${{ steps.holiday.outputs.is_holiday != 'true' }}
      id: token-cache-restore
      uses: actions/cache/restore@v4
      with:
        # 캐시에는 암호문(.enc)만 저장한다. 평문 토큰을 캐시에 두면
        # 다른 브랜치/포크 PR이 접두사로 복원해 탈취할 수 있다.
        path: .kis_token_cache.enc
        key: kis-token-shared-${{ github.run_id }}
        restore-keys: |
          kis-token-shared-

    - name: Decrypt KIS token cache
      if: ${{ steps.holiday.outputs.is_holiday != 'true' && hashFiles('.kis_token_cache.enc') != '' }}
      env:
        KIS_TOKEN_CACHE_KEY: ${{ secrets.KIS_TOKEN_CACHE_KEY }}
      run: |
        if [ -z "${KIS_TOKEN_CACHE_KEY:-}" ]; then
          echo "::warning::KIS_TOKEN_CACHE_KEY 미설정 - 캐시 복호화를 건너뜁니다."
          exit 0
        fi
        if openssl enc -d -aes-256-cbc -pbkdf2 -salt \
        -in .kis_token_cache.enc -out .kis_token_cache.json \
        -pass env:KIS_TOKEN_CACHE_KEY; then
          echo "토큰 캐시 복호화 성공 - 유효기간 내 기존 토큰을 재사용합니다."
        else
          echo "::warning::토큰 캐시 복호화 실패 - 손상/위조 캐시 제거 후 새 토큰을 발급합니다."
          rm -f .kis_token_cache.json
        fi

    - name: Run MagicSplit Bot (Domestic)
      if: ${{ steps.holiday.outputs.is_holiday != 'true' }}
      env:
        CONFIG_JSON_PATH: config_domestic.json
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_LIVE }}
        SLACK_WEBHOOK_DOMESTIC: ${{ secrets.SLACK_WEBHOOK_DOMESTIC }}
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        SLACK_CHANNEL_ID_DOMESTIC: ${{ secrets.SLACK_CHANNEL_ID_DOMESTIC }}
        KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
        KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        KIS_ACC_NO: ${{ secrets.KIS_ACC_NO }}
        IS_LIVE: 'true'
        PYTHONUNBUFFERED: "1"
      run: python -m src.main

    - name: Encrypt KIS token cache
      if: ${{ always() && steps.holiday.outputs.is_holiday != 'true' && hashFiles('.kis_token_cache.json') != '' }}
      env:
        KIS_TOKEN_CACHE_KEY: ${{ secrets.KIS_TOKEN_CACHE_KEY }}
      run: |
        if [ -z "${KIS_TOKEN_CACHE_KEY:-}" ]; then
          echo "::warning::KIS_TOKEN_CACHE_KEY 미설정 - 토큰을 캐시에 저장하지 않습니다."
          exit 0
        fi
        openssl enc -aes-256-cbc -pbkdf2 -salt \
        -in .kis_token_cache.json -out .kis_token_cache.enc \
        -pass env:KIS_TOKEN_CACHE_KEY

    - name: Save KIS token cache
      if: ${{ always() && steps.holiday.outputs.is_holiday != 'true' && hashFiles('.kis_token_cache.enc') != '' }}
      uses: actions/cache/save@v4
      with:
        path: .kis_token_cache.enc
        key: kis-token-shared-${{ github.run_id }}

    - name: Debug - List data and logs
      if: always()
      run: |
        echo "=== docs/data/domestic/ ==="
        ls -R docs/data/domestic/ || echo "Not found"
        echo "=== logs/domestic/ ==="
        ls -R logs/domestic/ || echo "Not found"

    - name: Commit, rebase, and push updated data and logs
      if: ${{ success() && steps.holiday.outputs.is_holiday != 'true' }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add --force docs/data/domestic/*.json || true
        git add --force logs/domestic/*.log || true
        if ! git diff --cached --quiet; then
          git commit -m "Auto-update domestic trading data and logs [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
        else
          echo "No data or log changes to commit"
        fi

    - name: Notify Slack on failure
      if: ${{ failure() && steps.holiday.outputs.is_holiday != 'true' }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_DOMESTIC || secrets.SLACK_WEBHOOK_LIVE }}
      run: |
        if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
          echo "SLACK_WEBHOOK_URL not set, skipping Slack notification"
          exit 0
        fi
        RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\":rotating_light: MagicSplit (Domestic) FAILED\n<${RUN_URL}|Run #${{ github.run_id }}>\"}" \
          "$SLACK_WEBHOOK_URL"

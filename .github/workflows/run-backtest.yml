name: Run MagicSplit Backtest

on:
  workflow_dispatch:
    inputs:
      start:
        description: '시작 날짜 (예: 2023-01-01)'
        required: true
        type: string
      end:
        description: '종료 날짜 (예: 2024-12-31)'
        required: true
        type: string
      initial_cash:
        description: '초기 자본 (기본값: 10000)'
        required: false
        type: string
        default: '10000'
      market_type:
        description: '마켓 타입 선택'
        required: true
        type: choice
        options:
          - '국내'
          - '해외'
        default: '해외'

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set Environment Variables
      env:
        MARKET_TYPE: ${{ inputs.market_type }}
      run: |
        if [ "$MARKET_TYPE" == "국내" ]; then
          echo "CONFIG_PATH=config_test_domestic.json" >> $GITHUB_ENV
          echo "MARKET_VAL=domestic" >> $GITHUB_ENV
        else
          echo "CONFIG_PATH=config_test_overseas.json" >> $GITHUB_ENV
          echo "MARKET_VAL=overseas" >> $GITHUB_ENV
        fi
      shell: bash

    - name: Run backtest
      env:
        # 입력값은 코드 인젝션 방지를 위해 env 경유로만 전달한다 (스크립트 내 직접 보간 금지)
        START_DATE: ${{ inputs.start }}
        END_DATE: ${{ inputs.end }}
        INITIAL_CASH: ${{ inputs.initial_cash }}
        RUN_NUMBER: ${{ github.run_number }}
      run: |
        python -c "
        import os
        from src.backtest.runner import run_backtest
        result = run_backtest(
            config_path=os.environ.get('CONFIG_PATH'),
            start_date=os.environ['START_DATE'],
            end_date=os.environ['END_DATE'],
            initial_cash=float(os.environ['INITIAL_CASH']),
            market_type=os.environ.get('MARKET_VAL'),
            run_number=os.environ['RUN_NUMBER'] + '_' + os.environ.get('MARKET_VAL'),
        )
        if result:
            pf = result.final_portfolio
            print(f'Final: Cash=\${pf.total_cash:,.0f}, Value=\${pf.total_value:,.0f}')
        else:
            print('Backtest returned no result.')
        "

    - name: Commit and Push Results
      uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5.2.0
      with:
        commit_message: "backtest result update (${{ inputs.start }} ~ ${{ inputs.end }}) [skip ci]"
        file_pattern: "docs/data/backtest/** logs/backtest/*"
        add_options: '--force'

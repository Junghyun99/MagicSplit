name: Migrate Snapshot FX Rate

on:
  workflow_dispatch:
    inputs:
      market:
        description: 'Market (overseas only; domestic is KRW and needs no FX)'
        required: true
        type: choice
        default: overseas
        options:
          - overseas
      overwrite:
        description: 'Overwrite snapshots that already have an exchange_rate'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Preview only - do not save/commit'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      PYTHONUTF8: '1'

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Migrate snapshot FX rate
      env:
        MARKET: ${{ github.event.inputs.market }}
        OVERWRITE: ${{ github.event.inputs.overwrite }}
        DRY_RUN: ${{ github.event.inputs.dry_run }}
      run: |
        ARGS="--market $MARKET"
        if [ "$OVERWRITE" = "true" ]; then ARGS="$ARGS --overwrite"; fi
        if [ "$DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
        python -m scripts.migrate_snapshot_fx $ARGS

    - name: Commit migrated snapshots
      if: ${{ github.event.inputs.dry_run != 'true' }}
      uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5.2.0
      with:
        commit_message: "Migrate snapshot FX rate: ${{ github.event.inputs.market }} [skip ci]"
        file_pattern: "docs/data/${{ github.event.inputs.market }}/snapshots.json"
        commit_user_name: "github-actions[bot]"
        commit_user_email: "github-actions[bot]@users.noreply.github.com"

name: MagicSplit Trading Bot (Crypto)

on:
  # 코인은 24시간 거래 — 원하는 주기로 cron 활성화 (예: 매시 정각)
  # schedule:
  #  - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: trading-crypto
  cancel-in-progress: false

jobs:
  trade-crypto:
    runs-on: self-hosted
    timeout-minutes: 20
    env:
      TZ: Asia/Seoul

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        # cache: pip 제거 — self-hosted Windows 러너에서 pip 캐시 폴더 부재로
        # 'Post Set up Python'(캐시 저장) 단계가 실패/경고. 상시 러너라 캐시 이점도 없음.

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Show runner time (KST)
      run: |
        Write-Host "Runner UTC : $((Get-Date).ToUniversalTime().ToString('yyyy-MM-dd HH:mm:ss UTC'))"
        Write-Host "KST equiv  : $((Get-Date).ToString('yyyy-MM-dd HH:mm:ss KST'))"
        Write-Host "업비트는 24시간 거래 — 시간대/휴장 제약 없음"

    - name: Run MagicSplit Bot (Crypto)
      env:
        CONFIG_JSON_PATH: config_crypto.json
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_LIVE }}
        SLACK_WEBHOOK_CRYPTO: ${{ secrets.SLACK_WEBHOOK_CRYPTO }}
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        SLACK_CHANNEL_ID_CRYPTO: ${{ secrets.SLACK_CHANNEL_ID_CRYPTO }}
        UPBIT_ACCESS_KEY: ${{ secrets.UPBIT_ACCESS_KEY }}
        UPBIT_SECRET_KEY: ${{ secrets.UPBIT_SECRET_KEY }}
        IS_LIVE: 'true'
        PYTHONUTF8: '1'
        PYTHONUNBUFFERED: '1'
      run: |
        if ([string]::IsNullOrEmpty($env:UPBIT_ACCESS_KEY) -or [string]::IsNullOrEmpty($env:UPBIT_SECRET_KEY)) {
          Write-Host "::error::UPBIT_ACCESS_KEY / UPBIT_SECRET_KEY 시크릿이 설정되지 않았습니다."
          exit 1
        }
        Write-Host "=== MagicSplit Trading Bot (Crypto) ==="
        Write-Host "Config : config_crypto.json"
        Write-Host "Broker : UpbitLiveBroker (실거래 서버, IS_LIVE=true)"
        Write-Host "======================================="
        python -m src.main

    - name: Debug - List data and logs
      if: always()
      run: |
        Write-Host "=== docs/data/crypto/ ==="
        Get-ChildItem -Recurse docs/data/crypto/ -ErrorAction SilentlyContinue
        Write-Host "=== logs/crypto/ ==="
        Get-ChildItem -Recurse logs/crypto/ -ErrorAction SilentlyContinue

    # git-auto-commit-action은 bash로 entrypoint.sh를 실행 -> self-hosted Windows(bash 없음)
    # 에서 'spawn bash ENOENT'로 실패한다. 네이티브 git(PowerShell)으로 대체한다.
    - name: Commit and push updated data and logs
      if: ${{ success() }}
      env:
        TARGET_REF: ${{ github.ref_name }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if (Test-Path docs/data/crypto) { git add --force docs/data/crypto }
        if (Test-Path logs/crypto)      { git add --force logs/crypto }
        git diff --cached --quiet
        if ($LASTEXITCODE -ne 0) {
          git commit -m "Auto-update crypto trading data and logs [skip ci]"
          git pull --rebase origin $env:TARGET_REF
          git push origin "HEAD:$env:TARGET_REF"
        } else {
          Write-Host "커밋할 변경 사항 없음 - 생략"
        }

    - name: Notify Slack on failure
      if: ${{ failure() }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_CRYPTO || secrets.SLACK_WEBHOOK_LIVE }}
      run: |
        if ([string]::IsNullOrEmpty($env:SLACK_WEBHOOK_URL)) {
          Write-Host "SLACK_WEBHOOK_URL 미설정 — Slack 알림 생략"
          exit 0
        }
        $runUrl = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        $body = @{ text = ":rotating_light: MagicSplit (Crypto) FAILED`n<$runUrl|Run #${{ github.run_id }}>" } | ConvertTo-Json
        Invoke-RestMethod -Uri $env:SLACK_WEBHOOK_URL -Method Post -ContentType 'application/json' -Body $body

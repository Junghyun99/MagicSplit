name: KIS Domestic Broker Live Test

# 수동 실행 전용 — push/PR 트리거 없음 (실거래 API 호출 방지)
on:
  workflow_dispatch:
    inputs:
      test_level:
        description: '테스트 수준: readonly(조회만, S1~S5) / full(매수+취소+타임아웃, S1~S8)'
        required: true
        default: 'readonly'
        type: choice
        options:
          - readonly
          - full
      test_ticker:
        description: '주문 테스트 종목코드 (full 모드에서만 사용. 6자리 KIS 코드 또는 yfinance 티커)'
        required: false
        default: '069500'

jobs:
  broker-live-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Show runner time (KST)
      run: |
        echo "Runner UTC : $(date -u '+%Y-%m-%d %H:%M:%S %Z')"
        echo "KST equiv  : $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S %Z')"
        echo "한국장 운영시간: 09:00~15:30 KST (호가 조회/주문 정상 동작 시간대)"

    - name: Restore KIS token cache
      id: token-cache-restore
      uses: actions/cache/restore@v4
      with:
        path: .kis_token_cache.json
        key: kis-token-${{ github.run_id }}
        restore-keys: |
          kis-token-

    - name: Run broker live tests
      env:
        KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
        KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        KIS_ACC_NO: ${{ secrets.KIS_ACC_NO }}
        IS_LIVE: 'true'
        RUN_ORDER_TESTS: ${{ inputs.test_level == 'full' && 'true' || 'false' }}
        TEST_TICKER: ${{ inputs.test_ticker }}
        PYTHONUTF8: '1'
        PYTHONUNBUFFERED: '1'
      run: |
        echo "=== KIS Domestic Broker Live Test ==="
        echo "Test level   : ${{ inputs.test_level }}"
        echo "Order tests  : $RUN_ORDER_TESTS"
        echo "Test ticker  : $TEST_TICKER"
        echo "Broker       : KisDomesticLiveBroker (실거래 서버)"
        echo "======================================"
        pytest tests/test_infra_broker_kis_domestic_live.py -v -s

    - name: Save KIS token cache
      if: always()
      uses: actions/cache/save@v4
      with:
        path: .kis_token_cache.json
        key: kis-token-${{ github.run_id }}

name: Manual Trade Crypto via Actions

on:
  workflow_dispatch:
    inputs:
      trades:
        description: 'Trades JSON array, e.g. [{"ticker":"KRW-BTC","action":"buy","amount":10000},{"ticker":"KRW-ETH","action":"sell"}]. action is buy|sell|sell_all. BUY amount는 KRW(미지정 시 config buy_amount), SELL=최고차수 lot, SELL_ALL=전량.'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: manual-trade-crypto
  cancel-in-progress: false

jobs:
  trade-crypto:
    runs-on: self-hosted
    timeout-minutes: 15
    env:
      TZ: Asia/Seoul

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Manual Trade (Crypto)
      env:
        CONFIG_JSON_PATH: config_crypto.json
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_LIVE }}
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        UPBIT_ACCESS_KEY: ${{ secrets.UPBIT_ACCESS_KEY }}
        UPBIT_SECRET_KEY: ${{ secrets.UPBIT_SECRET_KEY }}
        IS_LIVE: 'true'
        PYTHONUTF8: '1'
        PYTHONUNBUFFERED: '1'
        # 입력값(따옴표 포함 JSON)은 env 경유로만 전달하고 파일로 기록해 셸 인젝션/따옴표 소실을 방지한다.
        TRADES: ${{ github.event.inputs.trades }}
      run: |
        if ([string]::IsNullOrEmpty($env:UPBIT_ACCESS_KEY) -or [string]::IsNullOrEmpty($env:UPBIT_SECRET_KEY)) {
          Write-Host "::error::UPBIT_ACCESS_KEY / UPBIT_SECRET_KEY 시크릿이 설정되지 않았습니다."
          exit 1
        }
        # PowerShell -> python.exe 로 따옴표 포함 JSON을 안전하게 넘기기 위해 파일 경유(--trades-file).
        # .NET WriteAllText 는 UTF-8(BOM 없음) 으로 기록 -> json.loads 호환.
        [IO.File]::WriteAllText("$PWD/trades_input.json", $env:TRADES)
        Write-Host "=== Manual Trade (Crypto) ==="
        Write-Host "Config : config_crypto.json"
        Write-Host "Broker : UpbitLiveBroker (실거래 서버, IS_LIVE=true)"
        Write-Host "============================="
        python scripts/manual_trade.py --trades-file trades_input.json

    - name: Cleanup trades input
      if: always()
      run: Remove-Item trades_input.json -ErrorAction SilentlyContinue

    - name: Debug - List data and logs
      if: always()
      run: |
        Write-Host "=== docs/data/crypto/ ==="
        Get-ChildItem -Recurse docs/data/crypto/ -ErrorAction SilentlyContinue
        Write-Host "=== logs/crypto/ ==="
        Get-ChildItem -Recurse logs/crypto/ -ErrorAction SilentlyContinue

    # git-auto-commit-action은 bash로 entrypoint.sh를 실행 -> self-hosted Windows(bash 없음)
    # 에서 'spawn bash ENOENT'로 실패한다. 네이티브 git(PowerShell)으로 대체한다.
    - name: Commit and push updated data and logs
      if: ${{ success() }}
      env:
        TARGET_REF: ${{ github.ref_name }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if (Test-Path docs/data/crypto) { git add --force docs/data/crypto }
        if (Test-Path logs/crypto)      { git add --force logs/crypto }
        git diff --cached --quiet
        if ($LASTEXITCODE -ne 0) {
          git commit -m "Manual trade update (crypto) [skip ci]"
          git push origin "HEAD:$env:TARGET_REF"
        } else {
          Write-Host "커밋할 변경 사항 없음 - 생략"
        }

    - name: Notify Slack on failure
      if: ${{ failure() }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_LIVE }}
      run: |
        if ([string]::IsNullOrEmpty($env:SLACK_WEBHOOK_URL)) {
          Write-Host "SLACK_WEBHOOK_URL 미설정 — Slack 알림 생략"
          exit 0
        }
        $runUrl = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        $body = @{ text = ":rotating_light: MagicSplit Manual Trade (Crypto) FAILED`n<$runUrl|Run #${{ github.run_id }}>" } | ConvertTo-Json
        Invoke-RestMethod -Uri $env:SLACK_WEBHOOK_URL -Method Post -ContentType 'application/json' -Body $body

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagicSplit Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=20260427-1">
</head>
<body>
    <header class="page-header">
        <h1>MagicSplit</h1>
        <nav class="mode-switch" aria-label="data mode">
            <a href="?mode=domestic" data-mode="domestic" class="mode-link">Domestic</a>
            <a href="?mode=overseas" data-mode="overseas" class="mode-link">Overseas</a>
            <a href="?mode=backtest" data-mode="backtest" class="mode-link">Backtest</a>
            <a href="config-editor.html" class="mode-link">Config</a>
        </nav>
    </header>

    <div class="status-bar" id="status-bar">
        <span id="mode-badge" class="mode-badge">-</span>
        <span id="last-updated">Loading...</span>
        <span id="total-value">-</span>
        <span id="offline-badge" class="offline-badge" style="display:none">⚠️ 실패</span>
        <span class="refresh-controls">
            <span id="refresh-age" class="refresh-age"></span>
            <button id="refresh-btn" class="refresh-btn" title="새로고침">🔄</button>
            <select id="auto-refresh-select" class="auto-refresh-select" title="자동 새로고침">
                <option value="0">Off</option>
                <option value="30000">30초</option>
                <option value="60000">1분</option>
                <option value="300000">5분</option>
            </select>
        </span>
    </div>

    <nav class="view-switch" id="view-switch">
        <button class="view-link active" data-view="positions">Positions</button>
        <button class="view-link" data-view="history">History</button>
    </nav>

    <div id="reason-banner" class="reason-banner" style="display:none"></div>

    <div id="loading">Loading positions...</div>

    <section id="level-heatmap-section" class="heatmap-section" style="display:none">
        <h2>차수 흐름 (Level Heatmap)</h2>
        <div id="level-heatmap" class="heatmap-container"></div>
    </section>

    <div id="positions-container"></div>

    <div id="history-section" style="display:none">
        <section id="equity-curve-section" class="heatmap-section" style="display:none">
            <h2>자산 곡선 (Equity Curve)</h2>
            <div id="equity-curve" class="equity-curve-card"></div>
        </section>
        <div id="history-filters" class="filter-bar"></div>
        <div id="history-list"></div>
        <button id="load-more-btn" class="load-more-btn" style="display:none">더 보기</button>
    </div>

    <script src="js/services/data-repository.js?v=20260505-1"></script>
    <script src="js/models/dashboard-model.js?v=20260505-1"></script>
    <script src="js/models/history-model.js?v=20260505-1"></script>
    <script src="js/views/dashboard-view.js?v=20260505-1"></script>
    <script src="js/views/history-view.js?v=20260505-1"></script>
    <script src="js/views/charts-view.js?v=20260505-1"></script>
    <script src="js/controllers/dashboard-controller.js?v=20260505-1"></script>
    <script src="js/main.js?v=20260505-1"></script>
</body>
</html>

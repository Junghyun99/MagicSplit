<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagicSplit Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="page-header">
        <h1>MagicSplit</h1>
        <nav class="mode-switch" aria-label="data mode">
            <a href="?mode=live" data-mode="live" class="mode-link">Live</a>
            <a href="?mode=backtest" data-mode="backtest" class="mode-link">Backtest</a>
        </nav>
    </header>

    <div class="status-bar" id="status-bar">
        <span id="mode-badge" class="mode-badge">-</span>
        <span id="last-updated">Loading...</span>
        <span id="total-value">-</span>
    </div>

    <div id="loading">Loading positions...</div>
    <div id="positions-container"></div>

    <script src="js/main.js"></script>
</body>
</html>

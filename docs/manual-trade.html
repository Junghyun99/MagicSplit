<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagicSplit Manual Trade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=20260512-1">
    <style>
        .ticker-list-card {
            margin: 20px auto;
            max-width: 1000px;
        }

        .market-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .tab-btn {
            padding: 10px 25px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--bg-card);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .ticker-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .ticker-table th, .ticker-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .ticker-table th {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .ticker-info {
            display: flex;
            flex-direction: column;
        }

        .ticker-name {
            font-weight: 700;
            font-size: 1.05rem;
        }

        .ticker-symbol {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-level {
            background: #e0f2fe;
            color: #0369a1;
        }

        .badge-enabled {
            background: #dcfce7;
            color: #15803d;
        }

        .badge-disabled {
            background: #f1f5f9;
            color: #64748b;
        }

        .trade-actions {
            display: flex;
            gap: 8px;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 6px;
        }

        .btn-buy {
            background: var(--success);
            color: white;
        }

        .btn-sell {
            background: var(--danger);
            color: white;
        }

        /* Modal styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-title {
            margin: 0;
            font-size: 1.25rem;
        }

        .status-feedback {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            display: none;
            font-size: 0.9rem;
        }

        .status-feedback.info { background: #eff6ff; color: #1d4ed8; display: block; }
        .status-feedback.error { background: #fef2f2; color: #b91c1c; display: block; }
        .status-feedback.success { background: #f0fdf4; color: #15803d; display: block; }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s infinite linear;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body>
    <header class="page-header">
        <h1>Manual Trade</h1>
        <nav class="mode-switch" aria-label="data mode">
            <a href="index.html?mode=domestic" class="mode-link">Domestic</a>
            <a href="index.html?mode=overseas" class="mode-link">Overseas</a>
            <a href="index.html?mode=backtest" class="mode-link">Backtest</a>
            <a href="config-editor.html" class="mode-link">Config</a>
            <a href="manual-trade.html" class="mode-link active">Manual Trade</a>
        </nav>
    </header>

    <div class="card" id="auth-card" style="max-width: 600px; margin: 20px auto;">
        <h2>GitHub Settings</h2>
        <div class="form-group">
            <label>Personal Access Token (PAT)</label>
            <input type="password" id="github-token" placeholder="ghp_..." class="form-control">
            <small class="form-text">repo 스코프 권한이 필요합니다. 브라우저 로컬 스토리지에만 저장됩니다.</small>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Repository Owner</label>
                <input type="text" id="github-owner" placeholder="Owner" class="form-control">
            </div>
            <div class="form-group">
                <label>Repository Name</label>
                <input type="text" id="github-repo" placeholder="Repo" class="form-control">
            </div>
        </div>
        <div class="form-group">
            <label>Config File Path</label>
            <select id="config-path" class="form-control">
                <option value="config_overseas.json">config_overseas.json</option>
                <option value="config_domestic.json">config_domestic.json</option>
                <option value="presets.json">presets.json</option>
            </select>
        </div>
        <button id="load-config-btn" class="btn btn-primary" style="width: 100%;">설정 불러오기</button>
    </div>

    <div class="ticker-list-card">
        <div class="card">
            <table class="ticker-table">
                <thead>
                    <tr>
                        <th>종목명 (티커)</th>
                        <th>상태</th>
                        <th>현재 현황</th>
                        <th>조작</th>
                    </tr>
                </thead>
                <tbody id="ticker-tbody">
                    <tr><td colspan="4" style="text-align:center; padding: 40px;">데이터를 불러오는 중...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Order Modal -->
    <div class="modal-overlay" id="order-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">주문 실행</h2>
            </div>
            <div class="form-group">
                <p id="order-summary" style="margin: 0; line-height: 1.5;"></p>
                <small id="input-hint" class="form-text" style="display:block; margin-top:8px; color: var(--text-muted);"></small>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 24px;">
                <button class="btn btn-primary" id="confirm-trade-btn" style="flex: 2;">실행</button>
                <button class="btn" id="cancel-trade-btn" style="flex: 1; border: 1px solid var(--border);">취소</button>
            </div>
            <div id="status-feedback" class="status-feedback"></div>
        </div>
    </div>

    <script src="js/services/data-repository.js?v=20260512-1"></script>
    <script src="js/services/github-api.js?v=20260512-1"></script>
    <script src="js/manual-trade.js?v=20260512-1"></script>
</body>

</html>

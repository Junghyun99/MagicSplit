<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagicSplit Manual Trade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=20260507-1">
    <style>
        .trade-form-card {
            max-width: 600px;
            margin: 20px auto;
        }

        .market-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .market-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-card);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .market-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .action-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-card);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            text-align: center;
        }

        .action-btn[data-action="buy"].active {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        .action-btn[data-action="sell"].active {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        .status-feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .status-feedback.info {
            background: #e1f5fe;
            color: #01579b;
            display: block;
        }

        .status-feedback.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }

        .status-feedback.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <header class="page-header">
        <h1>Manual Trade</h1>
        <nav class="mode-switch" aria-label="data mode">
            <a href="index.html?mode=domestic" class="mode-link">Domestic</a>
            <a href="index.html?mode=overseas" class="mode-link">Overseas</a>
            <a href="index.html?mode=backtest" class="mode-link">Backtest</a>
            <a href="config-editor.html" class="mode-link">Config</a>
            <a href="manual-trade.html" class="mode-link active">Manual Trade</a>
        </nav>
    </header>

    <div class="card trade-form-card" id="auth-card">
        <h2>GitHub Settings</h2>
        <div class="form-group">
            <label>Personal Access Token (PAT)</label>
            <input type="password" id="github-token" placeholder="ghp_..." class="form-control">
            <small class="form-text">repo 스코프 권한이 필요합니다.</small>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Repository Owner</label>
                <input type="text" id="github-owner" placeholder="Owner" class="form-control">
            </div>
            <div class="form-group">
                <label>Repository Name</label>
                <input type="text" id="github-repo" placeholder="Repo" class="form-control">
            </div>
        </div>
        <button id="save-settings-btn" class="btn btn-primary" style="width: 100%;">설정 저장</button>
    </div>

    <div class="card trade-form-card" id="trade-card">
        <h2>Order Entry</h2>
        
        <label>Market Type</label>
        <div class="market-selector">
            <button class="market-btn active" data-market="domestic">국내 (Domestic)</button>
            <button class="market-btn" data-market="overseas">해외 (Overseas)</button>
        </div>

        <div class="form-group" style="position: relative;">
            <label>Ticker Search</label>
            <input type="text" id="ticker-search" class="form-control" placeholder="종목명 또는 코드 입력" autocomplete="off">
            <div id="ticker-results" class="search-dropdown" style="display:none"></div>
            <input type="hidden" id="selected-ticker">
        </div>

        <label>Action</label>
        <div class="action-selector">
            <button class="action-btn active" data-action="buy">BUY (매수)</button>
            <button class="action-btn" data-action="sell">SELL (매도)</button>
        </div>

        <div class="form-group">
            <label>Quantity (수량)</label>
            <input type="number" id="order-qty" class="form-control" placeholder="수량 입력" min="1">
        </div>

        <button id="execute-trade-btn" class="btn btn-primary" style="width: 100%; margin-top: 10px; background: var(--primary);">매매 실행 (GitHub Action)</button>

        <div id="status-feedback" class="status-feedback"></div>
    </div>

    <script src="js/services/data-repository.js?v=20260507-1"></script>
    <script src="js/services/github-api.js?v=20260507-1"></script>
    <script src="js/manual-trade.js?v=20260507-1"></script>
</body>

</html>
